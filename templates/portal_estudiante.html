<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f19">
<title>Consulta de resultados · IETECI</title>
<link rel="icon" type="image/png" href="/static/sipagre_logo_sm.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:        #3b82f6;
    --primary-dark:   #1d4ed8;
    --primary-light:  #60a5fa;
    --gold:           #facc15;
    --gold-dark:      #eab308;
    --bg:             #0b0f19;
    --card:           rgba(255,255,255,.03);
    --card-border:    rgba(255,255,255,.08);
    --text:           #f3f4f6;
    --muted:          #9ca3af;
    --success:        #10b981;
    --danger:         #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Fondo con resplandores animados ── */
  .bg-glow { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(110px); opacity: .13;
    animation: float 24s infinite ease-in-out alternate;
  }
  .blob-1 { width: 380px; height: 380px; background: #1e3a8a; top: -120px; left: -120px; }
  .blob-2 { width: 420px; height: 420px; background: #4f46e5; bottom: -160px; right: -120px; animation-delay: -7s; }
  .blob-3 { width: 280px; height: 280px; background: #facc15; top: 42%; left: 58%; opacity: .05; animation-delay: -13s; }
  @keyframes float {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(40px,-50px) scale(1.12); }
    100% { transform: translate(0,0) scale(1); }
  }

  .container { max-width: 680px; margin: 0 auto; padding: 28px 16px 70px; position: relative; z-index: 1; }

  /* ── Marca ── */
  .brand {
    text-align: center; margin-bottom: 26px;
    opacity: 0; transform: translateY(-12px);
    animation: fadeInDown .8s cubic-bezier(.16,1,.3,1) forwards;
  }
  .brand-logo {
    width: 86px; height: 86px; object-fit: contain;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,.5));
  }
  .brand-title {
    font-size: 1.45rem; font-weight: 800; margin: 8px 0 2px;
    letter-spacing: -.02em;
    background: linear-gradient(120deg, #ffffff, #93c5fd);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand-sub { font-size: .85rem; color: var(--muted); }

  /* ── Tarjeta glass ── */
  .glass {
    background: rgba(17,24,39,.55);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border: 1px solid var(--card-border);
    border-radius: 22px;
    box-shadow: 0 18px 38px rgba(0,0,0,.32);
  }

  /* ── Login ── */
  .login-card {
    padding: 28px 22px;
    opacity: 0; transform: translateY(18px);
    animation: fadeInUp .8s cubic-bezier(.16,1,.3,1) .15s forwards;
  }
  .login-card h2 { font-size: 1.2rem; font-weight: 700; margin: 0 0 6px; }
  .login-card .hint { font-size: .84rem; color: var(--muted); margin: 0 0 20px; }
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block; font-size: .73rem; color: var(--muted);
    margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
  }
  .input-group input {
    width: 100%; padding: 12px 15px; font-size: 1rem;
    background: rgba(0,0,0,.3); color: var(--text);
    border: 1.5px solid var(--card-border); border-radius: 12px;
    font-family: inherit; transition: all .25s ease;
  }
  .input-group input:focus {
    outline: none; border-color: var(--primary);
    background: rgba(0,0,0,.5);
    box-shadow: 0 0 14px rgba(59,130,246,.15);
  }
  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--primary-dark), #2563eb);
    color: #fff; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
    transition: all .25s ease;
    box-shadow: 0 8px 20px rgba(37,99,235,.25);
    font-family: inherit;
  }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(37,99,235,.35); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { opacity: .65; cursor: wait; }
  .msg { margin-top: 14px; padding: 10px 12px; border-radius: 10px; font-size: .82rem; display: none; }
  .msg.error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.4); color: #fca5a5; }

  /* ── Dashboard ── */
  .dash { display: none; }
  .dash-header {
    background: linear-gradient(135deg, rgba(30,58,138,.45), rgba(59,130,246,.14));
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 20px; padding: 22px; margin-bottom: 20px;
    opacity: 0; transform: translateY(18px);
    transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
  }
  .dash-header.animate { opacity: 1; transform: none; }
  .dash-greet { font-size: .88rem; color: #93c5fd; font-weight: 500; }
  .dash-name { font-size: 1.5rem; font-weight: 800; margin: 4px 0 10px; line-height: 1.15; }
  .dash-meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: .8rem; }
  .dash-meta span {
    background: rgba(255,255,255,.06); border: 1px solid var(--card-border);
    border-radius: 99px; padding: 4px 12px; color: var(--muted);
  }
  .dash-meta strong { color: var(--gold); font-weight: 600; }

  /* ── Tarjeta de simulacro ── */
  .sim-card {
    padding: 24px 20px; margin-bottom: 20px;
    opacity: 0; transform: translateY(24px);
    transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
  }
  .sim-card.animate { opacity: 1; transform: none; }
  .sim-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 3px; color: var(--gold); }
  .sim-meta { font-size: .78rem; color: var(--muted); margin-bottom: 20px; }

  /* ── Medidor circular ── */
  .gauge-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  .gauge { position: relative; width: 190px; height: 190px; }
  .gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge-bg { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 8; }
  .gauge-fill {
    fill: none; stroke: url(#gauge-grad); stroke-width: 9; stroke-linecap: round;
    stroke-dasharray: 251.2; stroke-dashoffset: 251.2;
    transition: stroke-dashoffset 1.8s cubic-bezier(.16,1,.3,1);
  }
  .gauge-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .gauge-score {
    font-size: 2.7rem; font-weight: 800; line-height: 1; color: var(--gold);
    display: flex; align-items: center; gap: 5px;
  }
  .gauge-score .medal { font-size: 1.7rem; }
  .gauge-max { font-size: .72rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; margin-top: 4px; }
  .gauge-pos {
    font-size: .76rem; color: var(--muted); margin-top: 5px; max-width: 130px;
    opacity: 0; transform: scale(.92);
    transition: all .45s cubic-bezier(.34,1.56,.64,1) 1.1s;
  }
  .sim-card.animate .gauge-pos { opacity: 1; transform: none; }

  /* ── Mensaje motivacional ── */
  .motiv {
    background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.18);
    color: #a7f3d0; padding: 10px 16px; border-radius: 12px;
    font-size: .8rem; font-weight: 500; text-align: center; line-height: 1.45;
    margin-bottom: 20px;
    opacity: 0; transform: scale(.95);
    transition: all .5s cubic-bezier(.34,1.56,.64,1) 1.2s;
  }
  .sim-card.animate .motiv { opacity: 1; transform: none; }

  /* ── Filas de asignaturas ── */
  .subject-row {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 6px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    opacity: 0; transform: translateY(12px);
    transition: opacity .5s cubic-bezier(.16,1,.3,1), transform .5s cubic-bezier(.16,1,.3,1);
  }
  .subject-row.animate { opacity: 1; transform: none; }
  .subject-row.best {
    background: rgba(250,204,21,.06);
    border: 1px solid rgba(250,204,21,.18);
    border-radius: 10px;
  }
  .subject-icon { width: 26px; text-align: center; font-size: 1.15rem; line-height: 1; }
  .subject-icon svg { vertical-align: middle; border-radius: 2px; }
  .subject-name { width: 116px; font-size: .84rem; font-weight: 600; color: #e5e7eb; line-height: 1.25; }
  .subject-name .best-tag { display: block; font-size: .62rem; color: var(--gold); font-weight: 600; }
  .subject-track {
    flex: 1; height: 9px; background: rgba(255,255,255,.05);
    border-radius: 9px; overflow: hidden; position: relative;
  }
  .subject-fill {
    height: 100%; border-radius: 9px; width: 0; position: relative;
    transition: width 1.4s cubic-bezier(.16,1,.3,1);
  }
  .subject-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
    animation: shine 2.6s infinite;
  }
  @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .subject-val { width: 32px; text-align: right; font-weight: 700; font-size: .92rem; }
  .subject-cmp { width: 82px; text-align: right; font-size: .68rem; font-weight: 600; }
  .cmp-up { color: var(--success); }
  .cmp-down { color: var(--danger); }
  .cmp-eq { color: var(--muted); }
  .sub-subject { padding-left: 20px; opacity: .85; }
  .sub-subject .subject-name { font-size: .76rem; color: var(--muted); }

  /* ── Botón de descarga ── */
  .btn-download {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 18px; padding: 13px 26px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #0f172a; border: none; border-radius: 12px;
    font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 15px rgba(250,204,21,.25);
    transition: all .25s ease; position: relative; overflow: hidden;
  }
  .btn-download:hover:not(.loading) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(250,204,21,.4); }
  .btn-download:active { transform: translateY(1px); }
  .btn-download.loading { color: transparent; pointer-events: none; }
  .btn-download.loading::after {
    content: ''; position: absolute; width: 20px; height: 20px;
    top: 50%; left: 50%; margin: -10px 0 0 -10px;
    border: 3px solid rgba(15,23,42,.2); border-top-color: #0f172a;
    border-radius: 50%; animation: spin .8s linear infinite;
  }

  /* ── Footer ── */
  .footer-bar {
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--card-border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px;
  }
  .footer-text { font-size: .72rem; color: var(--muted); }
  .btn-logout {
    background: transparent; color: var(--muted);
    border: 1px solid var(--card-border); border-radius: 8px;
    padding: 7px 14px; font-size: .8rem; cursor: pointer; font-family: inherit;
    transition: all .2s;
  }
  .btn-logout:hover { color: var(--text); border-color: rgba(255,255,255,.3); }

  /* ── Confeti ── */
  .confetti {
    position: fixed; width: 9px; height: 9px; top: -20px;
    background: var(--c); border-radius: 2px; opacity: .85;
    z-index: 50; pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(108vh) rotate(720deg) translateX(90px); }
  }

  .spin-ico {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
    border-radius: 50%; animation: spin .8s linear infinite;
    vertical-align: -2px; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
  @keyframes fadeInUp   { from { opacity: 0; transform: translateY(18px);  } to { opacity: 1; transform: none; } }

  /* ── Accesibilidad y equipos modestos ── */
  @media (prefers-reduced-motion: reduce) {
    .blob, .subject-fill::after, .confetti { animation: none !important; }
    .brand, .login-card { animation-duration: .01s; }
    .gauge-fill, .subject-fill, .sim-card, .dash-header, .subject-row,
    .motiv, .gauge-pos { transition-duration: .01s !important; transition-delay: 0s !important; }
  }
  @media (max-width: 460px) {
    .subject-name { width: 92px; font-size: .78rem; }
    .subject-cmp { width: 58px; font-size: .62rem; }
    .gauge { width: 165px; height: 165px; }
    .gauge-score { font-size: 2.3rem; }
    .dash-name { font-size: 1.25rem; }
    .blob { filter: blur(80px); }
  }
</style>
</head>
<body>

<div class="bg-glow" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<svg style="width:0;height:0;position:absolute;" aria-hidden="true">
  <linearGradient id="gauge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f59e0b"/>
    <stop offset="50%" stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#facc15"/>
  </linearGradient>
</svg>

<div class="container">

  <!-- ══ MARCA ══ -->
  <div class="brand">
    <img class="brand-logo" src="/static/sipagre_logo_sm.png" alt="SIPAGRE">
    <div class="brand-title">Consulta de resultados</div>
    <div class="brand-sub">Pruebas Saber 11° · Simulacros</div>
  </div>

  <!-- ══ LOGIN ══ -->
  <div class="glass login-card" id="login-card">
    <h2>Ingresa a tu cuenta</h2>
    <p class="hint">Usuario y contraseña son tu <strong>número de documento</strong>.</p>
    <form id="login-form" autocomplete="off">
      <div class="input-group">
        <label for="usuario">Usuario (documento)</label>
        <input type="text" id="usuario" inputmode="numeric"
               autocomplete="username" placeholder="Ej: 1098765432" required>
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password"
               autocomplete="current-password" placeholder="Ingresa tu documento" required>
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Ingresar →</button>
    </form>
    <div class="msg error" id="login-msg"></div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div class="dash" id="dash">
    <div class="dash-header" id="dash-header">
      <div class="dash-greet">👋 Hola de nuevo,</div>
      <div class="dash-name" id="dash-name">—</div>
      <div class="dash-meta">
        <span>📚 Curso <strong id="dash-curso">—</strong></span>
        <span>🎓 Grado <strong id="dash-grado">—</strong></span>
        <span>🆔 ID <strong id="dash-id">—</strong></span>
      </div>
    </div>

    <div id="dash-sims"></div>

    <div class="footer-bar">
      <div class="footer-text" id="footer-info">—</div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

</div>

<!-- jsPDF + módulo compartido del reporte individual -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/static/js/pdf_individual.js"></script>

<script>
const SUBJECT_LABELS = {
  mat:  'Matemáticas',
  lect: 'Lectura Crítica',
  soc:  'Sociales',
  nat:  'C. Naturales',
  ing:  'Inglés',
  quim: 'Química',
  fis:  'Física',
};
const SUBJECT_COLORS = {
  mat:  '#f59e0b',
  lect: '#06b6d4',
  soc:  '#10b981',
  nat:  '#a78bfa',
  ing:  '#ec4899',
  quim: '#facc15',
  fis:  '#fb923c',
};
// Los emojis de bandera no se ven en Windows: la Union Jack va como SVG.
const FLAG_UK_SVG = '<svg width="19" height="12" viewBox="0 0 60 30">' +
  '<rect width="60" height="30" fill="#012169"/>' +
  '<path d="M0,0 60,30 M60,0 0,30" stroke="#fff" stroke-width="6"/>' +
  '<path d="M0,0 60,30 M60,0 0,30" stroke="#C8102E" stroke-width="3"/>' +
  '<path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>' +
  '<path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></svg>';
const SUBJECT_ICONS = {
  mat: '🧮', lect: '📖', soc: '🌍', nat: '🔬',
  ing: FLAG_UK_SVG, quim: '⚗️', fis: '⚡',
};

// Mismos rangos y textos que el PDF (coherencia total con lo que descargan)
function medalFor(general) {
  if (general >= 300) return { e: '🏆',
    msg: 'Con esfuerzo, disciplina, perseverancia y constancia puedes ser potencial BECARIO' };
  if (general >= 221) return { e: '💪',
    msg: 'La clave del éxito es enfocarse en metas, no en obstáculos' };
  return { e: '📈',
    msg: 'El esfuerzo que pones hoy, será tu orgullo mañana' };
}

const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  await doLogin();
});

async function doLogin() {
  const user = document.getElementById('usuario').value.trim();
  const pwd  = document.getElementById('password').value.trim();
  const btn  = document.getElementById('btn-login');
  const msg  = document.getElementById('login-msg');

  if (!user || !pwd) {
    msg.textContent = 'Completa ambos campos.';
    msg.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin-ico"></span> Verificando...';
  msg.style.display = 'none';
  try {
    const resp = await fetch('/resultados/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({usuario: user, password: pwd})
    });
    const data = await resp.json();
    if (!data.success) {
      msg.textContent = data.error || 'No fue posible ingresar.';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar →';
      return;
    }
    renderDashboard(data);
  } catch(e) {
    msg.textContent = 'Error de conexión. Inténtalo de nuevo.';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Ingresar →';
  }
}

// Estado del estudiante autenticado (para generar el PDF)
let _studentData = null;

function renderDashboard(data) {
  document.getElementById('login-card').style.display = 'none';
  const dash = document.getElementById('dash');
  dash.style.display = 'block';

  _studentData = data;

  const s = data.student || {};
  document.getElementById('dash-name').textContent  = s.nombre || '—';
  document.getElementById('dash-curso').textContent = s.curso || '—';
  document.getElementById('dash-grado').textContent = s.grado ? (s.grado + '°') : '—';
  document.getElementById('dash-id').textContent    = s.id || '—';

  const container = document.getElementById('dash-sims');
  const results = data.results || [];
  if (!results.length) {
    container.innerHTML = `<div class="glass sim-card animate">
      <p style="color:var(--muted);text-align:center;">
        Aún no tienes resultados registrados.</p></div>`;
  } else {
    container.innerHTML = results.map((r, i) => renderSimSection(r, i)).join('');
  }
  document.getElementById('footer-info').textContent =
    `${results.length} simulacro(s) · Tus datos están protegidos.`;

  startAnimations(results);
}

function renderSimSection(r, idx) {
  const p = r.puntajes || {};
  const avgC = r.avg_curso || {};
  const isG10 = String(r.grado) === '10';
  const gen = p.gen != null ? Number(p.gen) : null;

  // Posición en el curso (dato real del backend)
  let posTxt = '';
  if (r.pos_curso && r.tot_curso) {
    posTxt = `Puesto <strong>${r.pos_curso}</strong> de ${r.tot_curso} en tu curso`;
  }

  const subjects = isG10
    ? ['mat','lect','soc','quim','fis','ing']  // 10° → Quím/Fís en lugar de Nat
    : ['mat','lect','soc','nat','ing'];

  // Mejor prueba (solo entre las 5 principales)
  const mainKeys = ['mat','lect','soc','nat','ing'].filter(k => p[k] != null);
  let bestKey = null, bestVal = -1;
  mainKeys.forEach(k => { if (Number(p[k]) > bestVal) { bestVal = Number(p[k]); bestKey = k; } });

  const rows = subjects.map(k => {
    const v = p[k];
    if (v == null) return '';
    const cmpVal = avgC[k];
    let cmpHtml = '<span class="subject-cmp cmp-eq">—</span>';
    if (cmpVal != null) {
      const diff = v - cmpVal;
      if (diff > 0)      cmpHtml = `<span class="subject-cmp cmp-up">▲ +${diff} vs curso</span>`;
      else if (diff < 0) cmpHtml = `<span class="subject-cmp cmp-down">▼ ${diff} vs curso</span>`;
      else               cmpHtml = `<span class="subject-cmp cmp-eq">igual al curso</span>`;
    }
    const isBest = (k === bestKey && bestVal > 0);
    const color = isBest ? '#facc15' : (SUBJECT_COLORS[k] || '#6366f1');
    return `
      <div class="subject-row${isBest ? ' best' : ''}">
        <span class="subject-icon">${SUBJECT_ICONS[k] || ''}</span>
        <div class="subject-name">${SUBJECT_LABELS[k] || k}${isBest ? ' ⭐<span class="best-tag">tu mejor prueba</span>' : ''}</div>
        <div class="subject-track">
          <div class="subject-fill" data-w="${Math.max(0, Math.min(100, v))}"
               style="background:${color};"></div>
        </div>
        <div class="subject-val" data-target="${v}">0</div>
        ${cmpHtml}
      </div>`;
  }).join('');

  // Naturales (promedio) para 10° bajo Quím+Fís
  let natRow = '';
  if (isG10 && p.nat != null) {
    natRow = `
      <div class="subject-row sub-subject">
        <span class="subject-icon">🔬</span>
        <div class="subject-name">Naturales (prom.)</div>
        <div class="subject-track">
          <div class="subject-fill" data-w="${p.nat}" style="background:rgba(167,139,250,.6);"></div>
        </div>
        <div class="subject-val" data-target="${p.nat}">0</div>
        <span class="subject-cmp cmp-eq">${(p.quim ?? '—')}/${(p.fis ?? '—')}</span>
      </div>`;
  }

  const medal = gen != null ? medalFor(gen) : null;

  return `
    <div class="glass sim-card" data-idx="${idx}">
      <div class="sim-title">${r.simulacro}</div>
      <div class="sim-meta">
        ${r.fecha ? `📅 ${r.fecha} · ` : ''}${r.tipo === 'completo' ? '2 sesiones' : 'Media jornada'}
      </div>

      ${gen != null ? `
      <div class="gauge-wrap">
        <div class="gauge">
          <svg viewBox="0 0 100 100">
            <circle class="gauge-bg" cx="50" cy="50" r="40"/>
            <circle class="gauge-fill" cx="50" cy="50" r="40" data-general="${gen}"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-score">
              <span class="score-num" data-target="${gen}">0</span>
              <span class="medal" style="display:none;">${medal.e}</span>
            </div>
            <span class="gauge-max">/ 500 PUNTOS</span>
            ${posTxt ? `<div class="gauge-pos">${posTxt}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="motiv">${medal.msg}</div>` : ''}

      <div>${rows}${natRow}</div>

      <div style="text-align:center;">
        <button class="btn-download" onclick="downloadStudentPdf(${idx}, this)">
          <span>📥 Descargar mi reporte PDF</span>
        </button>
      </div>
    </div>`;
}

// ── Animaciones (cascada + contadores + barras + confeti) ──────────────────
function animateValue(el, end, duration) {
  if (REDUCED_MOTION) { el.textContent = end; return; }
  let t0 = null;
  const step = (t) => {
    if (!t0) t0 = t;
    const pr = Math.min((t - t0) / duration, 1);
    el.textContent = Math.floor((pr * (2 - pr)) * end);
    if (pr < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function animateSimCard(card) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  card.classList.add('animate');

  // Medidor circular
  const gauge = card.querySelector('.gauge-fill');
  if (gauge) {
    const gen = Number(gauge.dataset.general) || 0;
    const off = 251.2 - (251.2 * Math.min(1, gen / 500));
    requestAnimationFrame(() => { gauge.style.strokeDashoffset = off; });
    const num = card.querySelector('.score-num');
    if (num) animateValue(num, gen, 1700);
    setTimeout(() => {
      const m = card.querySelector('.medal');
      if (m) m.style.display = 'inline';
    }, REDUCED_MOTION ? 0 : 1200);
  }

  // Filas escalonadas
  card.querySelectorAll('.subject-row').forEach((row, i) => {
    const delay = REDUCED_MOTION ? 0 : 500 + i * 140;
    setTimeout(() => {
      row.classList.add('animate');
      const fill = row.querySelector('.subject-fill');
      if (fill) fill.style.width = fill.dataset.w + '%';
      const val = row.querySelector('.subject-val');
      if (val) animateValue(val, Number(val.dataset.target) || 0, 1100);
    }, delay);
  });
}

function startAnimations(results) {
  setTimeout(() => document.getElementById('dash-header').classList.add('animate'), 80);

  const cards = [...document.querySelectorAll('.sim-card[data-idx]')];
  // La primera tarjeta anima de inmediato; las demás al entrar en pantalla
  if (cards[0]) setTimeout(() => animateSimCard(cards[0]), 320);
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => { if (en.isIntersecting) { animateSimCard(en.target); io.unobserve(en.target); } });
    }, {threshold: .25});
    cards.slice(1).forEach(c => io.observe(c));
  } else {
    cards.slice(1).forEach(c => animateSimCard(c));
  }

  // Confeti: una sola vez, si el simulacro más reciente alcanza 300+
  const first = (results || [])[0];
  const gen = first && first.puntajes ? Number(first.puntajes.gen) : 0;
  if (gen >= 300 && !REDUCED_MOTION) setTimeout(lanzarConfeti, 1400);
}

function lanzarConfeti() {
  const colors = ['#facc15', '#3b82f6', '#10b981', '#ec4899', '#a78bfa'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.setProperty('--c', colors[i % colors.length]);
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width  = (Math.random() * 6 + 5) + 'px';
    p.style.height = (Math.random() * 10 + 6) + 'px';
    const delay = Math.random() * .8, dur = Math.random() * 2 + 1.8;
    p.style.animationDelay = delay + 's';
    p.style.animationDuration = dur + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), (delay + dur) * 1000);
  }
}

// ══ GENERACIÓN DE PDF ═══════════════════════════════════════════════════════
// Usa el mismo renderStudentPage que el dashboard admin (módulo compartido
// /static/js/pdf_individual.js). Así el reporte individual del portal es
// idéntico al de la app JMR.
async function downloadStudentPdf(simIdx, btn) {
  if (!_studentData) return;
  const sim = _studentData.results[simIdx];
  if (!sim) return;
  if (!window.JMRPdf) {
    alert('El módulo de PDF no cargó. Refresca la página.');
    return;
  }

  const span = btn.querySelector('span');
  btn.classList.add('loading');

  try {
    await window.JMRPdf._loadLogo();
    const jsPDF = window.JMRPdf.getJsPDF();
    const doc = new jsPDF({orientation: 'p', unit: 'mm', format: 'letter'});

    const student = _studentData.student || {};
    const p = sim.puntajes || {};
    const st = {
      name:    student.nombre || '',
      id:      student.id     || '',
      curso:   sim.curso      || student.curso || '',
      mat:     p.mat || 0,
      lect:    p.lect || 0,
      soc:     p.soc || 0,
      nat:     p.nat || 0,
      ing:     p.ing || 0,
      general: p.gen || 0,
    };
    const pcts = sim.percentiles || {};
    const tipoLbl = sim.tipo === 'media' ? ' (Media)' : '';
    window.JMRPdf.renderStudentPage(doc, st, pcts, false, `${sim.simulacro}${tipoLbl}`);

    const safeName = (st.name || 'estudiante')
      .toUpperCase().replace(/[^A-Z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    const safeSim = (sim.simulacro || 'simulacro')
      .replace(/[^A-Za-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    doc.save(`Resultado_${safeName}_${safeSim}.pdf`);

    btn.classList.remove('loading');
    span.textContent = '✅ ¡Descargado!';
    setTimeout(() => { span.textContent = '📥 Descargar mi reporte PDF'; }, 2500);
  } catch(e) {
    console.error(e);
    btn.classList.remove('loading');
    span.textContent = '📥 Descargar mi reporte PDF';
    alert('No se pudo generar el PDF: ' + e.message);
  }
}

async function logout() {
  try { await fetch('/resultados/logout', {method:'POST'}); } catch(e) {}
  location.reload();
}

document.getElementById('usuario').focus();
